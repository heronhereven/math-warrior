<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Quest | 泡面侠训练站</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./app-extra.css">
</head>
<body>
  <div class="mq-bg-orb mq-bg-orb-a" aria-hidden="true"></div>
  <div class="mq-bg-orb mq-bg-orb-b" aria-hidden="true"></div>
  <div class="mq-stars" aria-hidden="true"></div>

  <div id="app" class="mq-app-shell">
    <div id="boot-screen" class="mq-overlay">
      <div class="mq-boot-card">
        <p class="mq-kicker pixel">math quest</p>
        <h1>泡面侠训练站</h1>
        <p id="boot-text">正在连接小和的工作台...</p>
      </div>
    </div>

    <section id="auth-screen" class="mq-auth-screen mq-hidden">
      <div class="mq-auth-card">
        <div class="mq-auth-copy">
          <p class="mq-kicker pixel">math quest</p>
          <h1>泡面侠的学习冒险</h1>
          <p>用账号接住每天的小进步，慢慢把自己练成更厉害的泡面侠。</p>
        </div>

        <div class="mq-auth-panel">
          <div class="mq-auth-tabs">
            <button type="button" class="active" data-auth-mode="login">登录</button>
            <button type="button" data-auth-mode="register">注册</button>
          </div>

          <div id="auth-error" class="mq-inline-note error"></div>

          <form id="login-form" class="mq-auth-form">
            <label>用户名<input id="login-username" autocomplete="username" required></label>
            <label>密码<input id="login-password" type="password" autocomplete="current-password" required></label>
            <button type="submit" class="mq-primary-btn">进入训练站</button>
          </form>

          <form id="register-form" class="mq-auth-form mq-hidden">
            <label>用户名<input id="register-username" autocomplete="username" required></label>
            <label>昵称<input id="register-display-name" autocomplete="nickname" required></label>
            <label>密码<input id="register-password" type="password" autocomplete="new-password" required></label>
            <button type="submit" class="mq-primary-btn">加入泡面侠</button>
          </form>
        </div>
      </div>
    </section>

    <section id="learner-app" class="mq-screen mq-hidden">
      <header class="mq-topbar">
        <div class="mq-brand">
          <p class="mq-kicker pixel">math quest</p>
          <h1>泡面侠训练站</h1>
        </div>
        <div class="mq-topbar-actions">
          <span id="learner-role-pill" class="mq-pill">泡面侠</span>
          <button type="button" class="mq-ghost-btn" id="logout-btn">退出</button>
        </div>
      </header>

      <main class="mq-learner-main">
        <section class="mq-hero-card">
          <div class="mq-hero-head">
            <div class="mq-avatar-stage">
              <div id="hero-avatar" class="mq-avatar">🍜</div>
              <div class="mq-avatar-badge pixel" id="hero-level">LV.1</div>
            </div>
            <div class="mq-hero-copy">
              <div class="mq-hero-name-row">
                <h2 id="hero-name">泡面侠</h2>
                <span id="hero-streak" class="mq-streak-pill mq-hidden">连签 0 天</span>
              </div>
              <p id="hero-title" class="mq-hero-title">今天也去把数学怪打得晕头转向。</p>
              <div class="mq-xp-card">
                <div class="mq-xp-head">
                  <span class="pixel" id="xp-total">0 块泡面</span>
                  <span id="xp-next">距离下一阶还差 100 块泡面</span>
                </div>
                <div class="mq-xp-track">
                  <div id="xp-fill" class="mq-xp-fill"></div>
                </div>
              </div>
            </div>
          </div>

          <div class="mq-hero-metrics" id="hero-metrics"></div>
        </section>

        <nav class="mq-nav">
          <button type="button" class="active" data-view="dashboard">今日冒险</button>
          <button type="button" data-view="calendar">印章月历</button>
          <button type="button" data-view="journey">成长足迹</button>
          <button type="button" data-view="settings">账号设置</button>
        </nav>

        <section id="learner-view-dashboard" class="mq-view"></section>
        <section id="learner-view-calendar" class="mq-view mq-hidden"></section>
        <section id="learner-view-journey" class="mq-view mq-hidden"></section>
        <section id="learner-view-settings" class="mq-view mq-hidden"></section>
      </main>
    </section>

    <section id="admin-app" class="mq-screen mq-hidden">
      <header class="mq-admin-topbar">
        <div class="mq-brand">
          <p class="mq-kicker pixel">math quest control</p>
          <h1>小和工作台</h1>
        </div>
        <div class="mq-topbar-actions">
          <span class="mq-pill admin">小和专属</span>
          <button type="button" class="mq-ghost-btn" id="admin-logout-btn">退出</button>
        </div>
      </header>

      <main class="mq-admin-main">
        <section id="admin-overview" class="mq-admin-overview"></section>

        <div class="mq-admin-grid">
          <aside class="mq-admin-sidebar">
            <section class="mq-admin-panel">
              <div class="mq-panel-head">
                <div>
                  <p class="mq-panel-kicker">proof queue</p>
                  <h2>待你点头</h2>
                </div>
                <button type="button" class="mq-ghost-btn" id="admin-refresh-btn">刷新</button>
              </div>
              <div id="admin-queue"></div>
            </section>

            <section class="mq-admin-panel">
              <div class="mq-panel-head">
                <div>
                  <p class="mq-panel-kicker">ramen heroes</p>
                  <h2>泡面侠分类</h2>
                </div>
              </div>
              <div id="admin-group-tabs" class="mq-filter-tabs"></div>
              <div id="admin-user-tabs" class="mq-admin-user-tabs"></div>
            </section>
          </aside>

          <section class="mq-admin-stage">
            <div id="admin-focus"></div>
          </section>
        </div>
      </main>
    </section>
  </div>

  <div id="toast" class="mq-toast"></div>
  <div id="exp-layer" class="mq-exp-layer" aria-hidden="true"></div>

  <script src="./app-client.js"></script>
</body>
</html>
